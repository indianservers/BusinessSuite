[pytest]
asyncio_mode = auto
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::ResourceWarning
    ignore:Support for class-based `config` is deprecated:DeprecationWarning
    ignore:Pydantic V1 style `@validator` validators are deprecated:DeprecationWarning
    ignore:`min_items` is deprecated and will be removed:DeprecationWarning
    ignore:'asyncio\.iscoroutinefunction' is deprecated:DeprecationWarning:pytest_asyncio\.plugin
    ignore:'asyncio\.get_event_loop_policy' is deprecated:DeprecationWarning:pytest_asyncio\.plugin
    ignore:datetime\.datetime\.utcnow\(\) is deprecated:DeprecationWarning:jose\.jwt
testpaths = tests
